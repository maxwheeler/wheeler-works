/* -----------------------------
   CSV parser (handles quoted fields with commas, and escaped quotes "")
------------------------------ */
function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let i = 0;
  let inQuotes = false;
  while (i < text.length) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') {
          field += '"';
          i += 2;
          continue;
        }
        inQuotes = false;
        i++;
        continue;
      }
      field += c;
      i++;
      continue;
    } else {
      if (c === '"') { inQuotes = true; i++; continue; }
      if (c === ',') { row.push(field); field = ''; i++; continue; }
      if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
      if (c === '\r') { i++; continue; }
      field += c;
      i++;
    }
  }
  if (field.length > 0 || row.length > 0) {
    row.push(field);
    rows.push(row);
  }
  return rows;
}

const rows = parseCSV(CSV_TEXT);
const headers = rows[0];
const data = rows.slice(1).map(r => {
  const obj = {};
  headers.forEach((h, idx) => { obj[h] = (r[idx] || '').trim(); });
  return obj;
});

const COL = {
  category: "Category",
  claim: "Trump's Claim About Biden's Term",
  reason: "Trump's Implied/Stated Reason to Elect Him Instead",
  context: "Notable Context/Venue",
  factCheck: "Fact-Check Status of Original Claim",
  record: "Trump's Second-Term Record on This Issue (as of May 2026)",
  bidenResp: "Biden Responsibility (if claim was at least partially true)",
  trumpResp: "Trump Responsibility (if claim was at least partially true)",
  approval: "Public Approval of Trump's Follow-Through (all polling with dates)"
};

/* Group rows by top-level category (text before " - "); keep subcategory as suffix. */
function topCategory(full) {
  const idx = full.indexOf(' - ');
  return idx === -1 ? full : full.slice(0, idx);
}
function subCategory(full) {
  const idx = full.indexOf(' - ');
  return idx === -1 ? '' : full.slice(idx + 3);
}

const grouped = {};
data.forEach(r => {
  const top = topCategory(r[COL.category]);
  if (!grouped[top]) grouped[top] = [];
  grouped[top].push(r);
});
const categoryNames = Object.keys(grouped);

/* -----------------------------
   Router / state
------------------------------ */
const state = {
  page: 'summary', // summary | claim | record | approval
  category: null,
  claimIndex: 0
};

const PAGE_LABELS = {
  summary: 'Summary',
  claim: 'The Claim',
  record: "Trump's 2nd Term Record",
  approval: 'What Do Americans Think?'
};

function snapshotState() {
  return { page: state.page, category: state.category, claimIndex: state.claimIndex };
}

let summaryScroll = 0;

function applyScroll(top) {
  // rAF so the new content has been laid out before we set scrollY
  requestAnimationFrame(() => window.scrollTo({ top, behavior: 'instant' }));
}

function go(page, opts) {
  opts = opts || {};
  if (state.page === 'summary' && page !== 'summary') {
    summaryScroll = window.scrollY;
  }
  state.page = page;
  if (opts.category !== undefined) state.category = opts.category;
  if (opts.claimIndex !== undefined) state.claimIndex = opts.claimIndex;
  history.pushState(snapshotState(), '');
  render();
  applyScroll(page === 'summary' ? summaryScroll : 0);
}

window.addEventListener('popstate', (e) => {
  const targetPage = e.state ? e.state.page : 'summary';
  if (state.page === 'summary' && targetPage !== 'summary') {
    summaryScroll = window.scrollY;
  }
  if (e.state) {
    state.page = e.state.page;
    state.category = e.state.category;
    state.claimIndex = e.state.claimIndex;
  } else {
    state.page = 'summary';
    state.category = null;
    state.claimIndex = 0;
  }
  render();
  applyScroll(state.page === 'summary' ? summaryScroll : 0);
});

/* -----------------------------
   Render helpers
------------------------------ */
function escapeHTML(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderCrumbs() {
  const crumbs = document.getElementById('crumbs');
  if (state.page === 'summary') {
    crumbs.innerHTML = '';
    return;
  }
  const parts = [`<a data-go="summary">Summary</a>`];
  if (state.category) {
    parts.push(' &rsaquo; ');
    parts.push(`<span>${escapeHTML(state.category)}</span>`);
    parts.push(' &rsaquo; ');
    parts.push(`<span>${escapeHTML(PAGE_LABELS[state.page])}</span>`);
  }
  crumbs.innerHTML = parts.join('');
  crumbs.querySelectorAll('a[data-go]').forEach(a => {
    a.addEventListener('click', () => go(a.dataset.go));
  });
}

function renderProgress() {
  if (state.page === 'summary') return '';
  const steps = ['claim', 'record', 'approval'];
  return `<div class="progress">${steps.map(s => {
    const i = steps.indexOf(s);
    const ci = steps.indexOf(state.page);
    const cls = i < ci ? 'done' : (i === ci ? 'active' : '');
    return `<div class="step ${cls}" title="${PAGE_LABELS[s]}"></div>`;
  }).join('')}</div>`;
}

function currentClaim() {
  return grouped[state.category][state.claimIndex];
}

function isEmpty(val) {
  if (!val) return true;
  const v = val.trim().toLowerCase();
  return v === '' || v === 'n/a' || v.startsWith('n/a ');
}

function extractApprovalPercent(text) {
  if (!text) return null;
  // 1) approve/support first (priority)
  let m = text.match(/(\d+)(?:\s*-\s*\d+)?\s*%\s*\b(?:approv|support)\w*/i);
  if (m) return parseInt(m[1], 10);
  m = text.match(/\b(?:approv|support)\w*\b[^.0-9]{0,25}~?\s*(\d+)(?:\s*-\s*\d+)?\s*%/i);
  if (m) return parseInt(m[1], 10);
  // 2) disapprove/oppose (inverted)
  m = text.match(/(\d+)(?:\s*-\s*\d+)?\s*%\s*\b(?:disapprov|oppos)\w*/i);
  if (m) return 100 - parseInt(m[1], 10);
  m = text.match(/\b(?:disapprov|oppos)\w*\b[^.0-9]{0,25}~?\s*(\d+)(?:\s*-\s*\d+)?\s*%/i);
  if (m) return 100 - parseInt(m[1], 10);
  // 3) blame Trump / blaming the Trump admin (inverted; counts as disapprove)
  m = text.match(/(\d+)(?:\s*-\s*\d+)?\s*%\s+(?:say(?:ing)?\s+)?blam\w*[^.0-9]{0,40}\b(?:trump|him|admin)\b/i);
  if (m) return 100 - parseInt(m[1], 10);
  m = text.match(/\bblam\w*\b[^.0-9]{0,30}?\b(?:trump|him|admin)[^.0-9]{0,40}?(\d+)(?:\s*-\s*\d+)?\s*%/i);
  if (m) return 100 - parseInt(m[1], 10);
  // 4) trust (treat as approve-like)
  m = text.match(/\btrust\w*\b[^.]{0,60}?(\d+)\s*%\s*Trump/i);
  if (m) return parseInt(m[1], 10);
  return null;
}

function classifyApproval(text) {
  const t = (text || '').trim().toLowerCase();
  if (!t || t.startsWith('n/a')) return { cls: 'app-na', label: 'No Polling', pct: null };
  const pct = extractApprovalPercent(text);
  if (pct !== null) {
    if (pct >= 60) return { cls: 'app-green', label: `~${pct}% Approve`, pct };
    if (pct >= 50) return { cls: 'app-yellow', label: `~${pct}% Approve`, pct };
    return { cls: 'app-red', label: `~${pct}% Approve`, pct };
  }
  // Qualitative fallback: when no clean approve/disapprove percent surfaces,
  // map breadth-of-rejection or breadth-of-support phrasing to a red/green badge.
  const negCues = /\bbroadly\s+(rejected|opposed|contested|unpopular|negative)\b|\bheavily\s+(against|opposed|contested)\b|\btrump[-\s]negative\b|\bnet[-\s]negative\b|\bplays?\s+badly\s+across\s+the\s+spectrum\b/i;
  const posCues = /\bbroadly\s+(supported|popular|approved|positive)\b|\bheavily\s+(supported|approved|popular)\b|\btrump[-\s]positive\b|\bnet[-\s]positive\b/i;
  if (negCues.test(text)) return { cls: 'app-red', label: 'Broadly Negative', pct: null };
  if (posCues.test(text)) return { cls: 'app-green', label: 'Broadly Positive', pct: null };
  return { cls: 'app-na', label: 'Unclear', pct: null };
}

function classifyRecord(text) {
  const t = (text || '').trim().toLowerCase();
  if (!t || t.startsWith('n/a')) return { cls: 'rec-na', label: 'N/A' };
  // Strong Not-Fulfilled signals (checked first so qualifiers like "then reversed" override "partially fulfilled")
  if (t.startsWith('not fulfilled')) return { cls: 'rec-red', label: 'Not Fulfilled' };
  if (t.startsWith('largely not fulfilled')) return { cls: 'rec-red', label: 'Not Fulfilled' };
  if (t.startsWith('largely unchanged')) return { cls: 'rec-red', label: 'Not Fulfilled' };
  if (t.startsWith('reversed but inverted')) return { cls: 'rec-red', label: 'Not Fulfilled' };
  if (/\bthen\s+(?:fully\s+|largely\s+|re-?)?reversed\b/.test(t)) return { cls: 'rec-red', label: 'Not Fulfilled' };
  // Partly fulfilled / mixed
  if (t.startsWith('partially fulfilled') || t.startsWith('partly fulfilled')) return { cls: 'rec-yellow', label: 'Partly Fulfilled' };
  if (t.startsWith('mixed') || t.startsWith('genuinely mixed')) return { cls: 'rec-yellow', label: 'Partly Fulfilled' };
  // Fulfilled
  if (t.startsWith('fulfilled') || t.startsWith('largely fulfilled') || t.startsWith('largely repealed')) return { cls: 'rec-green', label: 'Fulfilled' };
  // Fallback substring checks
  if (t.includes('not fulfilled')) return { cls: 'rec-red', label: 'Not Fulfilled' };
  if (t.includes('fulfilled')) return { cls: 'rec-green', label: 'Fulfilled' };
  return { cls: 'rec-yellow', label: 'Partly Fulfilled' };
}

function classifyFactCheck(text) {
  const t = (text || '').trim().toLowerCase();
  if (!t) return { cls: 'fc-mixed', label: 'Unrated' };
  if (t.startsWith('mostly true') || t.startsWith('partly true')) return { cls: 'fc-mixed', label: 'Partly True' };
  if (t.startsWith('largely false')) return { cls: 'fc-false', label: 'Largely False' };
  if (t.startsWith('true')) return { cls: 'fc-true', label: 'True' };
  if (t.startsWith('false')) return { cls: 'fc-false', label: 'False' };
  if (t.startsWith('misleading')) return { cls: 'fc-false', label: 'Misleading' };
  if (t.startsWith('mixed')) return { cls: 'fc-mixed', label: 'Mixed' };
  if (t.startsWith('contested')) return { cls: 'fc-mixed', label: 'Contested' };
  if (t.startsWith('unfalsifiable')) return { cls: 'fc-mixed', label: 'Unfalsifiable' };
  if (t.startsWith('subjective')) return { cls: 'fc-mixed', label: 'Subjective' };
  if (t.startsWith('speculative')) return { cls: 'fc-mixed', label: 'Speculative' };
  return { cls: 'fc-mixed', label: 'Mixed' };
}

/* Map any classifier output class suffix to a traffic-light color. */
function pillColor(cls) {
  if (!cls) return 'gray';
  if (cls.endsWith('-true') || cls.endsWith('-green')) return 'green';
  if (cls.endsWith('-mixed') || cls.endsWith('-yellow')) return 'yellow';
  if (cls.endsWith('-false') || cls.endsWith('-red')) return 'red';
  return 'gray';
}

function renderSummary() {
  const sections = categoryNames.map(cat => {
    const rows = grouped[cat].map((r, idx) => {
      const sub = subCategory(r[COL.category]);
      const fc = classifyFactCheck(r[COL.factCheck]);
      const rec = classifyRecord(r[COL.record]);
      const app = classifyApproval(r[COL.approval]);
      const colors = [pillColor(fc.cls), pillColor(rec.cls), pillColor(app.cls)];
      const worst = colors.includes('red') ? 'red'
                  : colors.includes('yellow') ? 'yellow'
                  : colors.includes('green') ? 'green' : 'gray';
      return `
        <button class="summary-row row-${worst}" data-cat="${escapeHTML(cat)}" data-idx="${idx}">
          <div class="summary-claim">
            ${sub ? `<span class="sub">${escapeHTML(sub)}</span>` : ''}
            <span class="text">${escapeHTML(r[COL.claim])}</span>
          </div>
          <div class="tl-cell" data-label="Fact Check">
            <span class="tl-dot tl-${pillColor(fc.cls)}"></span>${escapeHTML(fc.label)}
          </div>
          <div class="tl-cell" data-label="Record">
            <span class="tl-dot tl-${pillColor(rec.cls)}"></span>${escapeHTML(rec.label)}
          </div>
          <div class="tl-cell" data-label="Approval">
            <span class="tl-dot tl-${pillColor(app.cls)}"></span>${escapeHTML(app.label)}
          </div>
        </button>
      `;
    }).join('');
    return `
      <section class="summary-section">
        <h3 class="summary-section-title">${escapeHTML(cat)}</h3>
        ${rows}
      </section>
    `;
  }).join('');

  const html = `
    <h2 class="page-title">All claims at a glance</h2>
    <p class="summary-intro">Every claim Trump made about Biden's term, with traffic lights for the fact-check of the original claim, Trump's second-term record, and public approval of his follow-through. Click any row to dig in.</p>
    <div class="summary-head">
      <div>Claim</div>
      <div>Fact Check</div>
      <div>2nd Term Record</div>
      <div>Public Approval</div>
    </div>
    ${sections}
  `;
  document.getElementById('app').innerHTML = html;
  document.querySelectorAll('.summary-row').forEach(b => {
    b.addEventListener('click', () => go('claim', {
      category: b.dataset.cat,
      claimIndex: parseInt(b.dataset.idx, 10)
    }));
  });
  attachNavButtons();
}

function renderClaim() {
  const r = currentClaim();
  const sub = subCategory(r[COL.category]);
  const html = `
    ${renderProgress()}
    <h2 class="page-title">The Claim</h2>
    <p class="page-sub">${escapeHTML(state.category)}${sub ? ' &middot; ' + escapeHTML(sub) : ''}</p>
    <div class="cards">
      <div class="card">
        ${sub ? `<span class="subcat">${escapeHTML(sub)}</span>` : ''}
        <p class="claim">${escapeHTML(r[COL.claim])}</p>
        <div class="meta-row">
          <div class="reason" style="margin:0;">
            <span class="label">1. Trump's reason you should pick him</span>
            ${escapeHTML(r[COL.reason])}
          </div>
          <div class="meta">
            <span class="label">2. Notable context / venue</span>
            ${escapeHTML(r[COL.context]) || '<span class="empty">No context recorded</span>'}
          </div>
          ${(() => {
            const fc = classifyFactCheck(r[COL.factCheck]);
            return `
              <div class="meta fact-check ${fc.cls}">
                <span class="label">3. Fact-check of the original claim</span>
                <span class="rating-pill">${fc.label}</span>
                <div>${escapeHTML(r[COL.factCheck]) || '<span class="empty">Not rated</span>'}</div>
              </div>
            `;
          })()}
          ${!isEmpty(r[COL.bidenResp]) ? `
            <div class="meta biden">
              <span class="label">4. Biden's responsibility</span>
              ${escapeHTML(r[COL.bidenResp])}
            </div>
          ` : ''}
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost" data-go="summary">&larr; Back to Summary</button>
      <button class="btn" data-go="record">Trump's 2nd Term Record &rarr;</button>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
  attachNavButtons();
}

function renderRecord() {
  const r = currentClaim();
  const sub = subCategory(r[COL.category]);
  const rec = classifyRecord(r[COL.record]);
  const html = `
    ${renderProgress()}
    <h2 class="page-title">Trump's 2nd Term Record</h2>
    <p class="page-sub">${escapeHTML(state.category)}${sub ? ' &middot; ' + escapeHTML(sub) : ''} &middot; what's actually happened, as of May 2026.</p>
    <div class="cards">
      <div class="card">
        ${sub ? `<span class="subcat">${escapeHTML(sub)}</span>` : ''}
        <p class="claim">${escapeHTML(r[COL.claim])}</p>
        <div class="meta-row">
          <div class="meta record ${rec.cls}">
            <span class="label">1. Trump's 2nd-term record on this issue (May 2026)</span>
            <span class="rating-pill">${rec.label}</span>
            <div>${escapeHTML(r[COL.record]) || '<span class="empty">No record recorded</span>'}</div>
          </div>
          ${!isEmpty(r[COL.trumpResp]) ? `
            <div class="meta trump">
              <span class="label">2. Trump's responsibility</span>
              ${escapeHTML(r[COL.trumpResp])}
            </div>
          ` : ''}
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost" data-go="claim">&larr; Back to the Claim</button>
      <button class="btn" data-go="approval">What do Americans Think? &rarr;</button>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
  attachNavButtons();
}

function renderApproval() {
  const r = currentClaim();
  const sub = subCategory(r[COL.category]);
  const html = `
    ${renderProgress()}
    <h2 class="page-title">What Do Americans Think</h2>
    <p class="page-sub">${escapeHTML(state.category)}${sub ? ' &middot; ' + escapeHTML(sub) : ''} &middot; public-approval polling on Trump's follow-through.</p>
    <div class="cards">
      <div class="card">
        ${sub ? `<span class="subcat">${escapeHTML(sub)}</span>` : ''}
        <p class="claim">${escapeHTML(r[COL.claim])}</p>
        ${(() => {
          const app = classifyApproval(r[COL.approval]);
          return `
            <div class="meta approval ${app.cls}">
              <span class="label">Public approval of Trump's follow-through</span>
              <span class="rating-pill">${app.label}</span>
              <div>${isEmpty(r[COL.approval]) ? '<span class="empty">No relevant polling found</span>' : escapeHTML(r[COL.approval])}</div>
            </div>
          `;
        })()}
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost" data-go="record">&larr; Back to Record</button>
      <button class="btn secondary" data-go="summary">Back to Summary</button>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
  attachNavButtons();
}

function attachNavButtons() {
  document.querySelectorAll('[data-go]').forEach(b => {
    b.addEventListener('click', () => go(b.dataset.go));
  });
}

function render() {
  renderCrumbs();
  switch (state.page) {
    case 'summary': renderSummary(); break;
    case 'claim': renderClaim(); break;
    case 'record': renderRecord(); break;
    case 'approval': renderApproval(); break;
  }
}

history.replaceState(snapshotState(), '');
render();
</script>
</body>
</html>
